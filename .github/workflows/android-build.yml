name: Android CI

on:
  push:
    branches: [ "main", "master" ]
    tags:     [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]

# Deny all token permissions at the workflow level; each job grants only what it needs.
permissions:
  contents: read

jobs:
  # ── Secret scanning ────────────────────────────────────────────────────────
  # Scans commits for accidentally-committed credentials, API keys, tokens, etc.
  secret-scan:
    name: Secret Scanning (TruffleHog)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source (full history for secret scan)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@v3.88.4
        with:
          path: ./
          # On PRs compare PR head vs base; on pushes compare new vs previous commit
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          head: ${{ github.sha }}
          extra_args: --only-verified

  # ── Android Lint & static analysis ────────────────────────────────────────
  # Runs 500+ Android-specific checks including security misconfigurations,
  # hardcoded credentials, insecure WebView settings, and code correctness.
  lint:
    name: Android Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Write local.properties
        run: |
          echo "GITHUB_CLIENT_ID=${{ secrets.GITHUB_CLIENT_ID || 'REPLACE_WITH_YOUR_CLIENT_ID' }}" >> local.properties
          echo "GITHUB_CLIENT_SECRET=${{ secrets.GITHUB_CLIENT_SECRET || 'REPLACE_WITH_YOUR_CLIENT_SECRET' }}" >> local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Android Lint
        run: ./gradlew lintDebug --no-daemon

      - name: Upload Lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          retention-days: 30

  # ── Dependency vulnerability review ───────────────────────────────────────
  # On pull requests: flags any new dependency that has a known CVE.
  dependency-review:
    name: Dependency Vulnerability Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4.6.0
        with:
          fail-on-severity: high

  # ── Unit tests ────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Write local.properties
        run: |
          echo "GITHUB_CLIENT_ID=${{ secrets.GITHUB_CLIENT_ID || 'REPLACE_WITH_YOUR_CLIENT_ID' }}" >> local.properties
          echo "GITHUB_CLIENT_SECRET=${{ secrets.GITHUB_CLIENT_SECRET || 'REPLACE_WITH_YOUR_CLIENT_SECRET' }}" >> local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew test --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/reports/tests/
          retention-days: 30

  # ── Debug APK build ───────────────────────────────────────────────────────
  # Only runs when secret-scan, lint, and tests all pass.
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: [ secret-scan, lint, test ]
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Verify required secrets
        env:
          GITHUB_CLIENT_ID: ${{ secrets.GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GITHUB_CLIENT_SECRET }}
        run: |
          if [ -z "$GITHUB_CLIENT_ID" ] || [ -z "$GITHUB_CLIENT_SECRET" ]; then
            echo "::error::GITHUB_CLIENT_ID and GITHUB_CLIENT_SECRET secrets must be set. See README for setup instructions."
            exit 1
          fi

      - name: Write local.properties
        env:
          GITHUB_CLIENT_ID: ${{ secrets.GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GITHUB_CLIENT_SECRET }}
        run: |
          echo "GITHUB_CLIENT_ID=$GITHUB_CLIENT_ID" >> local.properties
          echo "GITHUB_CLIENT_SECRET=$GITHUB_CLIENT_SECRET" >> local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      # Generate a SHA-256 checksum so you can verify the downloaded APK hasn't been tampered with.
      - name: Generate APK checksum
        run: |
          cd app/build/outputs/apk/debug
          sha256sum app-debug.apk > app-debug.apk.sha256
          echo "### ✅ APK SHA-256 Checksum" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat app-debug.apk.sha256 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "Verify integrity on your computer before installing:" >> $GITHUB_STEP_SUMMARY
          echo '`sha256sum -c app-debug.apk.sha256`' >> $GITHUB_STEP_SUMMARY

      - name: Upload debug APK + checksum
        uses: actions/upload-artifact@v4
        with:
          name: VSCodeMobile-debug
          # Includes both the APK and its SHA-256 checksum for integrity verification
          path: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/debug/app-debug.apk.sha256
          # Keep for 30 days so it can be downloaded and sideloaded onto your phone
          retention-days: 30

  # ── GitHub Release (runs only when a version tag is pushed) ───────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Verify required secrets
        env:
          GITHUB_CLIENT_ID: ${{ secrets.GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GITHUB_CLIENT_SECRET }}
        run: |
          if [ -z "$GITHUB_CLIENT_ID" ] || [ -z "$GITHUB_CLIENT_SECRET" ]; then
            echo "::error::GITHUB_CLIENT_ID and GITHUB_CLIENT_SECRET secrets must be set for release builds."
            exit 1
          fi

      - name: Write local.properties
        env:
          GITHUB_CLIENT_ID: ${{ secrets.GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GITHUB_CLIENT_SECRET }}
        run: |
          echo "GITHUB_CLIENT_ID=$GITHUB_CLIENT_ID" >> local.properties
          echo "GITHUB_CLIENT_SECRET=$GITHUB_CLIENT_SECRET" >> local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APK and generate checksum
        run: |
          TAG="${{ github.ref_name }}"
          cp app/build/outputs/apk/release/app-release-unsigned.apk \
             "VSCodeMobile-${TAG}.apk"
          sha256sum "VSCodeMobile-${TAG}.apk" > "VSCodeMobile-${TAG}.apk.sha256"

      - name: Create GitHub Release and upload APK + checksum
        uses: softprops/action-gh-release@v2
        with:
          files: |
            VSCodeMobile-*.apk
            VSCodeMobile-*.apk.sha256
          generate_release_notes: true
